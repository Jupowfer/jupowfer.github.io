<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=/blog-hexo/">
  <title>月亮不睡 - 博客迁移</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(200deg, #a0cfe4, #e8c37e);
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { color: #333; margin-bottom: 20px; }
    a {
      color: #4d4d4d;
      text-decoration: none;
      font-size: 18px;
      padding: 10px 20px;
      border: 2px solid #4d4d4d;
      border-radius: 5px;
      display: inline-block;
      transition: all 0.3s;
    }
    a:hover {
      background: #4d4d4d;
      color: white;
    }
    p { color: #666; margin-top: 20px; }
    .links { margin-top: 30px; }
    .links a { margin: 0 10px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌙 月亮不睡</h1>
    <p>博客已迁移到新的位置</p>
    <a href="/blog-hexo/">进入 Hexo 博客</a>
    <div class="links">
      <p>其他版本：</p>
      <a href="/blog-jekyll/" style="border: none; text-decoration: underline;">Jekyll 版本</a>
    </div>
  </div>
</body>
</html>
