---
layout: default
---

<div class="home">
  <ul class="post-list">
    {% for post in site.posts %}
    <li class="post-item">
      <article class="post">
        <header class="post-header">
          <h2 class="post-title">
            <a class="post-link" href="{{ post.url }}">{{ post.title | escape }}</a>
          </h2>
          <div class="post-meta">
            <time datetime="{{ post.date | date_to_xmlschema }}">
              <i class="fa-regular fa-calendar"></i> {{ post.date | date: "%Y-%m-%d" }}
            </time>
            {% if post.tags %}
            <span class="post-tags">
              {% for tag in post.tags %}
              <span class="tag">{{ tag }}</span>
              {% endfor %}
            </span>
            {% endif %}
          </div>
        </header>
        
        <div class="post-excerpt">
          {{ post.excerpt | strip_html | truncate: 200 }}
        </div>
        
        <a class="read-more" href="{{ post.url }}">展开全文 >></a>
      </article>
    </li>
    {% endfor %}
  </ul>
</div>
