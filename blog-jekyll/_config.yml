title: 月亮不睡
email: jupowfer@gmail.com
description: >-
  编程随想的博客 - 分享技术、记录生活
baseurl: "/blog-jekyll"
url: "https://jupowfer.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Jekyll settings
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Author
author:
  name: 月亮不睡
  avatar: /assets/tx.jpg

# Social links
social:
  github: Jupowfer
  email: jupowfer@gmail.com

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .idea
  - .explyt
